name: wisecare_agent
description: "WiseAgent app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Navigation
  go_router: ^14.2.0

  # Network
  dio: ^5.4.0

  # Local storage
  hive_flutter: ^1.1.0

  # SVG rendering (used by widgets/common/svg_image.dart + flutter_gen)
  flutter_svg: ^2.0.10+1

  # Web: device frame preview (iPhone 15 Pro)
  device_frame: ^1.4.0

  # Typography (Poppins, Lexend)
  google_fonts: ^6.2.1

  # File picker (profile photo upload)
  file_picker: ^8.0.0+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_gen_runner: ^5.4.0
  build_runner: ^2.4.8
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/
    - assets/files/

flutter_gen:
  output: lib/gen/
  integrations:
    flutter_svg: true

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/app_icon.png"
